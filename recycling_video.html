<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Sustainability Kiosk | Home</title>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
  <link rel="stylesheet" href="fonts/stylesheet.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <video autoplay muted loop id="video">
    <source src="media/recycle.mp4" type="video/mp4">
    <track default kind="captions"
     srclang="en"
     src="media/captions.vtt"/>
  </video>
</body>
<script type='text/javascript' defer>
    document.getElementById('video').addEventListener('play', (e) => {
      console.log('Listener set.')
      setTimeout(() => {
        window.location = "https://osu-sustainability-office.github.io/sustainability-kiosks/"
      }, 94000)
    })
</script>
</html>
